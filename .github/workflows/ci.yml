name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install web dependencies
        shell: bash
        run: |
          if [ -f apps/web/package-lock.json ]; then
            npm ci --prefix apps/web
          elif [ -f apps/web/package.json ]; then
            npm install --prefix apps/web
          else
            echo "apps/web belum dibuat; web checks dilewati."
          fi

      - name: Lint, typecheck, test, and build web
        shell: bash
        run: |
          if [ -f apps/web/package.json ]; then
            npm --prefix apps/web run lint --if-present
            npm --prefix apps/web run typecheck --if-present
            npm --prefix apps/web run test --if-present
            npm --prefix apps/web run build --if-present
          fi

  ai:
    name: AI service checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install AI service dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f services/ai/requirements.txt ]; then
            pip install -r services/ai/requirements.txt
          elif [ -f services/ai/pyproject.toml ]; then
            pip install -e services/ai
          else
            echo "services/ai belum dibuat; AI checks dilewati."
          fi

      - name: Run AI service tests
        shell: bash
        run: |
          if [ -d services/ai/tests ]; then
            python -m pytest services/ai/tests -q
          fi

  database:
    name: Database checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Supabase CLI
        shell: bash
        run: npm install --global supabase@2.106.0

      - name: Start local Supabase
        shell: bash
        run: supabase start --log-level error > /dev/null

      - name: Reset database from migrations
        shell: bash
        run: supabase db reset

      - name: Capture ownership claim test output
        id: claim_diagnostic
        continue-on-error: true
        shell: bash
        run: |
          set +e
          supabase test db supabase/tests/database/claim_submission.test.sql > /tmp/claim-submission.log 2>&1
          status=$?
          echo "$status" > /tmp/claim-submission.status
          tail -n 120 /tmp/claim-submission.log
          exit "$status"

      - name: Upload ownership claim diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claim-submission-diagnostic
          path: |
            /tmp/claim-submission.log
            /tmp/claim-submission.status
          if-no-files-found: error
          retention-days: 1

      - name: Diagnose ownership claim safety tests
        shell: bash
        run: supabase test db supabase/tests/database/claim_submission_safety.test.sql

      - name: Fail when ownership claim diagnostic failed
        shell: bash
        run: |
          status="$(cat /tmp/claim-submission.status)"
          if [ "$status" -ne 0 ]; then
            cat /tmp/claim-submission.log
            exit "$status"
          fi

      - name: Run database tests
        shell: bash
        run: supabase test db

      - name: Run database lint
        shell: bash
        run: supabase db lint --level warning

      - name: Export local Supabase public env
        shell: bash
        run: |
          supabase status -o env > /tmp/supabase.env
          set -a
          source /tmp/supabase.env
          set +a
          echo "::add-mask::$ANON_KEY"
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$ANON_KEY" >> "$GITHUB_ENV"
          echo "APP_ORIGIN=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "RUN_SUPABASE_AUTH_INTEGRATION=1" >> "$GITHUB_ENV"
          echo "NEXT_APP_URL=http://127.0.0.1:3000" >> "$GITHUB_ENV"
          echo "MAILPIT_URL=http://127.0.0.1:54324" >> "$GITHUB_ENV"
          echo "SUPABASE_DB_HOST=127.0.0.1" >> "$GITHUB_ENV"
          echo "SUPABASE_DB_PORT=54322" >> "$GITHUB_ENV"
          echo "SUPABASE_DB_USER=postgres" >> "$GITHUB_ENV"
          echo "SUPABASE_DB_PASSWORD=postgres" >> "$GITHUB_ENV"
          echo "SUPABASE_DB_NAME=postgres" >> "$GITHUB_ENV"

      - name: Install web dependencies for auth integration
        shell: bash
        run: npm ci --prefix apps/web

      - name: Install Playwright browser
        shell: bash
        run: npm --prefix apps/web exec playwright install --with-deps chromium

      - name: Build web for auth integration
        shell: bash
        run: npm --prefix apps/web run build

      - name: Start web for auth integration
        shell: bash
        run: |
          npm --prefix apps/web run start > /tmp/lnfti-web.log 2>&1 &
          echo "$!" > /tmp/lnfti-web.pid
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/lnfti-web.log
          exit 1

      - name: Run auth integration tests
        shell: bash
        run: npm --prefix apps/web run test:auth-integration

      - name: Stop web
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/lnfti-web.pid ]; then
            kill "$(cat /tmp/lnfti-web.pid)" || true
          fi

      - name: Stop local Supabase
        if: always()
        shell: bash
        run: supabase stop --no-backup
